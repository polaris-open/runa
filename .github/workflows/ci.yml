name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Check
        run: make check

  no-runtime-deps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert no runtime dependencies are declared
        run: |
          python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)

          deps = data["project"].get("dependencies", [])
          assert deps == [], f"unexpected runtime dependencies: {deps}"
          print("OK: no runtime dependencies declared.")
          PY
